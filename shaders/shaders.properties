# Byteshade Path-Traced - Shader Configuration
# Ultimate realism path-traced shaderpack for Iris Shaders

name=Byteshade PT
description=Ultimate realism path-traced shaderpack with physically-based rendering, screen-space global illumination, reflections, atmospheric scattering, and cinematic post-processing.

# Buffer formats
colortex0.format=RGBA16
colortex1.format=RGBA16
colortex2.format=RGBA16
colortex3.format=RGBA16
colortex4.format=RGBA16
colortex5.format=RGBA16
depthtex0.format=RGB32

# Shadow map
shadow.map.resolution=2048
shadow.distance=80.0

# Composite pipeline
composite.count=2

# Lighting
old_lighting=off
old_lighting_strength=0.0

# Texture resolution
texture.resolution=128

# Programs (composite and final are automatic)
programs=gbuffers_basic gbuffers_textured gbuffers_textured_lit gbuffers_terrain gbuffers_water gbuffers_entities gbuffers_block gbuffers_hand gbuffers_weather gbuffers_skybasic gbuffers_skytextured
