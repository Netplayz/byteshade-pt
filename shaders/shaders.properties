# Byteshade Path-Traced - Shader Configuration
# Ultimate realism path-traced shaderpack for Iris Shaders

name=Byteshade PT
description=Ultimate realism path-traced shaderpack with physically-based rendering, screen-space global illumination, reflections, atmospheric scattering, and cinematic post-processing.

# Buffer declarations
buffers=colortex0 colortex1 colortex2 colortex3 colortex4 colortex5

# G-buffer: colortex0 = albedo.rgb + flags.a (float needed for material flags > 1)
colortex0.format=RGBA16F
# G-buffer: colortex1 = normal.xy + blockLM.b + skyLM.a
colortex1.format=RGBA16
# G-buffer: colortex2 = roughness.r + metallic.g + SSS.b + emission.a
colortex2.format=RGBA16
# Composite output: deferred HDR lit color
colortex3.format=RGBA16F
# Reserved for GI temporal accumulation
colortex4.format=RGBA16F
# Reserved for future use
colortex5.format=RGBA16F

# Shadow map
shadow.map.resolution=2048
shadow.distance=80.0

# Composite pipeline (composite + final)
composite.count=5

# Lighting
old_lighting=off
old_lighting_strength=0.0

# Programs (colon-separated, composite/final are automatic)
programs=gbuffers_basic:gbuffers_textured:gbuffers_textured_lit:gbuffers_terrain:gbuffers_water:gbuffers_entities:gbuffers_block:gbuffers_hand:gbuffers_weather:gbuffers_skybasic:gbuffers_skytextured
